<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
  <title>Login - Sistema de Biblioteca</title>
</head>
<body>

  <h1>Sistema de Biblioteca</h1>

  <button type="button" id="tabLogin">Entrar</button>
  <button type="button" id="tabRegistro">Registrar</button>

  <p id="mensagem"></p>

  <form id="formLogin">
    <h2>Entrar</h2>

    <label for="loginEmail">Email</label>
    <input type="email" id="loginEmail" required />

    <label for="loginSenha">Senha</label>
    <input type="password" id="loginSenha" required />

    <button type="submit">Entrar</button>
  </form>

  <form id="formRegistro" style="display:none;">
    <h2>Registrar</h2>

    <label for="registroNome">Nome</label>
    <input type="text" id="registroNome" required />

    <label for="registroEmail">Email</label>
    <input type="email" id="registroEmail" required />

    <label for="registroSenha">Senha</label>
    <input type="password" id="registroSenha" required minlength="6" />

    <label for="registroPerfil">Perfil</label>
    <select id="registroPerfil">
      <option value="leitor">Leitor</option>
      <option value="bibliotecario">Bibliotecário</option>
    </select>

    <button type="submit">Registrar</button>
  </form>

  <script src="app.js"></script>
</body>
</html>
