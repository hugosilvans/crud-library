<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
  <title>Painel do Leitor</title>
</head>
<body>

  <h1>Painel do Leitor</h1>

  <!-- O JavaScript coloca aqui o nome do usuario logado. -->
  <span id="nomeUsuario"></span>

  <!-- Botao ligado a funcao logout() no app.js. -->
  <button type="button" id="btnSair">Sair</button>

  <!-- Area de mensagens da pagina. -->
  <p id="mensagem"></p>

  <h2>Livros disponiveis</h2>

  <!-- Tabela preenchida dinamicamente por carregarLivrosLeitor(). -->
  <table border="1">
    <thead>
      <tr>
        <th>ID</th>
        <th>Titulo</th>
        <th>Autor</th>
        <th>Ano</th>
        <th>Disponivel</th>
        <th>Acao</th>
      </tr>
    </thead>
    <tbody id="tabelaLivros">
      <tr><td colspan="6">Carregando...</td></tr>
    </tbody>
  </table>

  <h2>Meus emprestimos</h2>

  <!-- Tabela preenchida dinamicamente por carregarMeusEmprestimos(). -->
  <table border="1">
    <thead>
      <tr>
        <th>Livro</th>
        <th>Data emprestimo</th>
        <th>Data prevista</th>
        <th>Status</th>
        <th>Acao</th>
      </tr>
    </thead>
    <tbody id="tabelaEmprestimos">
      <tr><td colspan="5">Carregando...</td></tr>
    </tbody>
  </table>

  <script src="app.js"></script>
</body>
</html>
